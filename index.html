<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Random Lunch Picker</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1>Mein Random Picker</h1>
    <p>
      Keine Ahnung was du heute essen sollst? Wähle eine Kategorie aus und bekomme einen leckeren Essensvorschlag. Guten Appetit!
    </p>

    <div class="box">
      <h2>Suppen</h2>
      <button onclick="pickSoup()">Wähle Suppe</button>
      <p id="result_suppen"></p>
    </div>

    <div class="box">
      <h2>Salate</h2>
      <button onclick="pickSalad()">Wähle Salat</button>
      <p id="result_salate"></p>
    </div>

    <div class="box">
      <h2>Frühstück</h2>
      <button onclick="pickBreakfast()">Wähle Frühstück</button>
      <p id="result_frühstück"></p>
    </div>

    <div class="box">
      <h2>Desserts</h2>
      <button onclick="pickDessert()">Wähle Dessert</button>
      <p id="result_desserts"></p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
